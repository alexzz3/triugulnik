<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Паскал Анализатор</title>
    <style>
        body {
            font-family: 'Helvetica', sans-serif;
            background-color: #222;
            color: white;
            text-align: center;
            padding: 20px;
        }
        
        /* Панел за информация */
        #info-panel {
            background: #333;
            border-left: 5px solid #4CAF50;
            padding: 15px;
            margin: 20px auto;
            width: 80%;
            max-width: 600px;
            text-align: left;
            min-height: 80px;
            border-radius: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        
        h2 { color: #4CAF50; margin: 0 0 10px 0; font-size: 20px;}
        .stat { margin: 5px 0; font-size: 18px; }
        .highlight-text { color: #FFeb3b; font-weight: bold; }

        /* Триъгълникът */
        .row {
            display: flex;
            justify-content: center;
            margin: 5px 0;
            position: relative;
        }
        
        /* Показване на сумата до реда */
        .row-sum {
            position: absolute;
            right: 10%;
            color: #888;
            font-size: 14px;
            line-height: 34px;
        }

        .cell {
            width: 36px;
            height: 36px;
            line-height: 36px;
            margin: 2px;
            background-color: #444;
            border-radius: 50%;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            user-select: none;
        }

        .cell:hover {
            background-color: #4CAF50;
            transform: scale(1.3);
            color: black;
            font-weight: bold;
            box-shadow: 0 0 15px #4CAF50;
        }

        input { padding: 8px; border-radius: 4px; border: none; text-align: center;}
        button { padding: 8px 15px; background: #4CAF50; border: none; color: white; cursor: pointer; border-radius: 4px; font-weight: bold;}
        button:hover { background: #45a049; }
    </style>
</head>
<body>

    <h1>Анализатор на Паскал</h1>
    
    <div id="info-panel">
        <h2>Информация за клетката:</h2>
        <div class="stat" id="binom-stat">Посочете число...</div>
        <div class="stat" id="algebra-stat">Връзка с алгебрата...</div>
    </div>

    <div style="margin-bottom: 20px;">
        <label>Брой редове:</label>
        <input type="number" id="rowsInput" value="10" max="15" min="3">
        <button onclick="generateTriangle()">Изчисли</button>
    </div>

    <div id="triangle-container"></div>

    <script>
        function generateTriangle() {
            const rows = parseInt(document.getElementById('rowsInput').value);
            const container = document.getElementById('triangle-container');
            container.innerHTML = '';

            let triangle = [];

            for (let n = 0; n < rows; n++) {
                triangle[n] = [];
                let rowDiv = document.createElement('div');
                rowDiv.className = 'row';

                // Смятане на сумата на реда (Свойство 2^n)
                let rowSum = 0;

                for (let k = 0; k <= n; k++) {
                    // Формула за изчисляване
                    if (k === 0 || k === n) {
                        triangle[n][k] = 1;
                    } else {
                        triangle[n][k] = triangle[n-1][k-1] + triangle[n-1][k];
                    }
                    
                    rowSum += triangle[n][k];

                    // Създаване на клетката
                    let cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.innerText = triangle[n][k];
                    
                    // ДОБАВЯНЕ НА ИНТЕРАКТИВНОСТ (Най-важната част)
                    cell.onmouseover = function() {
                        updateInfo(n, k, triangle[n][k], rowSum);
                    };

                    rowDiv.appendChild(cell);
                }

                // Добавяне на сумата отстрани (Визуално доказателство)
                let sumLabel = document.createElement('div');
                sumLabel.className = 'row-sum';
                sumLabel.innerText = `Sum: ${rowSum} (2^${n})`;
                rowDiv.appendChild(sumLabel);

                container.appendChild(rowDiv);
            }
        }

        function updateInfo(n, k, value, sum) {
            // Връзка с Биномните коефициенти (Точка 1 от заданието)
            document.getElementById('binom-stat').innerHTML = 
                `Биномен коефициент: <span class="highlight-text">C(${n}, ${k})</span> = ${value}`;
            
            // Връзка с Алгебрата (Точка 2 от заданието)
            // Показва как това число участва във формула (a+b)^n
            let algebraTerm = "";
            if (k === 0) algebraTerm = `1.a^${n}`;
            else if (k === n) algebraTerm = `1.b^${n}`;
            else algebraTerm = `${value}.a^${n-k}.b^${k}`;

            document.getElementById('algebra-stat').innerHTML = 
                `Във формулата (a+b)^${n} това е частта: <span class="highlight-text">${algebraTerm}</span>`;
        }

        generateTriangle();
    </script>
</body>
</html>
